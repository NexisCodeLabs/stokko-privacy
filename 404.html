<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — NexisCodeLabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #E8650A;
      --bg: #0C0C0B;
      --border: rgba(255,255,255,0.07);
      --text: #F2F0EB;
      --text2: #A09E98;
      --text3: #5C5A55;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }
    .code {
      font-family: 'Syne', sans-serif;
      font-size: 120px;
      font-weight: 800;
      color: var(--text3);
      letter-spacing: -6px;
      line-height: 1;
      margin-bottom: 16px;
    }
    .code span { color: var(--orange); }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 15px;
      color: var(--text2);
      font-weight: 300;
      margin-bottom: 32px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--orange);
      text-decoration: none;
      border: 1px solid rgba(232,101,10,0.3);
      padding: 10px 22px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    a:hover { background: rgba(232,101,10,0.08); }
  </style>
</head>
<body>
  <div class="code">4<span>0</span>4</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist or was moved.</p>
  <a href="/">← Back to NexisCodeLabs</a>
</body>
</html>
